[package]
name = "thalora-browser-apis"
version = "0.1.0"
edition = "2021"
description = "Browser Web APIs for Thalora - extracted from Boa engine fork"
authors = ["Brainwires Team"]
license = "MIT"

[dependencies]
# Boa engine - required for JavaScript integration
boa_engine = { path = "../boa/core/engine" }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Async runtime
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# HTTP client for Fetch API
reqwest = { version = "0.12", features = ["json", "rustls-tls", "cookies"], default-features = false }

# WebSocket support
tokio-tungstenite = { version = "0.20", features = ["native-tls"] }
tungstenite = "0.20"

# JSON serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"

# UUID generation
uuid = { version = "1.0", features = ["v4"] }

# Base64 encoding
base64 = "0.22"

# URL handling
url = "2.5"

# Collections
indexmap = "2.0"

# Concurrency
parking_lot = "0.12"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

[lib]
name = "thalora_browser_apis"
path = "src/lib.rs"
