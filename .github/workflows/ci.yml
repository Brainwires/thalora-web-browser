name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config clang libclang-dev libasound2-dev
      - name: Check workspace
        run: cargo check --workspace
      - name: Check boa engine
        run: cargo check --manifest-path engines/boa/Cargo.toml --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config clang libclang-dev libasound2-dev
      - name: Clippy workspace
        run: cargo clippy --workspace
      - name: Clippy boa engine
        run: cargo clippy --manifest-path engines/boa/Cargo.toml --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format workspace
        run: cargo fmt --all --check
      - name: Format boa engine
        run: cargo fmt --all --check --manifest-path engines/boa/Cargo.toml

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config clang libclang-dev libasound2-dev
      - name: Build binary for MCP harness tests
        run: cargo build --bin thalora
      - name: Test workspace
        run: cargo test --workspace -- --test-threads=1
        env:
          RUST_MIN_STACK: 16777216
      - name: Test boa engine
        run: cargo test --manifest-path engines/boa/Cargo.toml --workspace -- --test-threads=1

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config clang libclang-dev libasound2-dev
      - name: Doc workspace
        run: cargo doc --workspace --no-deps
      - name: Doc boa engine
        run: cargo doc --manifest-path engines/boa/Cargo.toml --workspace --no-deps
