[package]
name = "thalora"
version = "0.1.0"
edition = "2021"
resolver = "2"
description = "Pure Rust headless browser for AI models - fast, secure web content extraction with MCP integration"
authors = ["Brainwires Team"]
license = "MIT"
repository = "https://github.com/brainwires/thalora"
keywords = ["headless-browser", "ai", "mcp", "web-scraping", "rust"]
categories = ["web-programming", "parsing"]

[dependencies]
# Shared constants
thalora-constants = { path = "shared/thalora-constants" }

# MCP protocol
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }

# HTTP client
reqwest = { version = "0.12", features = ["json", "native-tls", "rustls-tls", "gzip", "brotli", "deflate", "cookies", "http2", "stream", "multipart"], default-features = false }

# HTML parsing
scraper = "0.24"
html5ever = "0.27"
kuchikiki = "0.8"

# CSS parsing and layout  
lightningcss = "1.0.0-alpha.67"
taffy = "0.5"

# Browser APIs - extracted from Boa engine for modular architecture
thalora-browser-apis = { path = "engines/thalora-browser-apis" }

# Boa engine - required for macros like js_string!
boa_engine = { path = "engines/boa/core/engine" }

# Async trait support for engine abstraction
async-trait = "0.1"

# WebAssembly runtime - Full V8-compatible stack
wasmtime = { version = "21.0", features = ["component-model", "async", "runtime", "cranelift", "cache", "pooling-allocator"] }
wasmtime-wasi = "21.0"
wasmtime-wast = "21.0"
wasm-bindgen = "0.2"
wat = "1.0"
wasmparser = "0.121"
wasm-encoder = "0.38"

# Geolocation services
sysinfo = "0.31"
ipgeolocate = "0.3"

# WebRTC implementation
webrtc = "0.11"
webrtc-util = "0.8"
webrtc-data = "0.7"
webrtc-media = "0.6"
webrtc-ice = "0.10"
webrtc-dtls = "0.7"

# Audio/Media processing
cpal = "0.15"
hound = "3.5"
symphonia = "0.5"
rodio = "0.19"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# URL handling
url = "2.5"

# Random number generation for human-like behavior
rand = "0.8"

# Concurrency-friendly mutexes and synchronization primitives
parking_lot = "0.12"

# URL decoding helper used by scraping utilities
urlencoding = "2.1"

# Async utilities
futures = "0.3"

# STDIO handling
tokio-util = { version = "0.7", features = ["codec"] }

# Command line argument parsing
clap = { version = "4.0", features = ["derive"] }

# Regex for JavaScript processing
regex = "1.10"

# HTML escaping
html-escape = "0.2"

# UUID generation for WebSocket connections
uuid = { version = "1.0", features = ["v4"] }

# WebSocket implementation
tokio-tungstenite = { version = "0.20", features = ["native-tls"] }
tungstenite = "0.20"
futures-util = "0.3"

# Service Worker implementation (extends existing tokio features)

# Challenge solving dependencies
base64 = "0.22"

# CDP (Chrome DevTools Protocol) support
chrono = { version = "0.4", features = ["serde"] }

# GUI dependencies (optional - enable with "gui" feature)
winit = { version = "0.29", optional = true }
wgpu = { version = "0.20", optional = true }
egui = { version = "0.28", optional = true }
egui-winit = { version = "0.28", optional = true }
egui-wgpu = { version = "0.28", optional = true }
pollster = { version = "0.3", optional = true }
env_logger = { version = "0.11", optional = true }
log = { version = "0.4", optional = true }

# AI Memory Heap for persistent storage
dirs = "5.0"
vfs = { path = "vfs", default-features = false }

[[bin]]
name = "thalora"
path = "src/main.rs"

[features]
default = []
# GUI mode with winit and wgpu for graphical browser interface
gui = ["winit", "wgpu", "egui", "egui-winit", "egui-wgpu", "pollster", "env_logger", "log"]

[dev-dependencies]
tokio-test = "0.4"
wiremock = "0.6"


# Resolver to handle dependency conflicts
[package.metadata.docs.rs]
all-features = true
