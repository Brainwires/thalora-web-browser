[package]
name = "thalora"
version = "0.1.0"
edition = "2021"
resolver = "2"
description = "Pure Rust headless browser for AI models - fast, secure web content extraction with MCP integration"
authors = ["Brainwires Team"]
license = "MIT"
repository = "https://github.com/brainwires/thalora"
keywords = ["headless-browser", "ai", "mcp", "web-scraping", "rust"]
categories = ["web-programming", "parsing"]

[dependencies]
# MCP protocol
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }

# HTTP client
reqwest = { version = "0.12", features = ["json", "rustls-tls", "gzip", "brotli", "deflate", "cookies", "http2", "stream"], default-features = false }

# HTML parsing
scraper = "0.24"
html5ever = "0.27"
kuchikiki = "0.8"

# CSS parsing and layout  
lightningcss = "1.0.0-alpha.67"
taffy = "0.5"

# JavaScript engine (pure Rust) - using local submodule for customization
boa_engine = { path = "engines/boa/core/engine" }

# WebAssembly runtime - Full V8-compatible stack
wasmtime = { version = "21.0", features = ["component-model", "async", "runtime", "cranelift", "cache", "pooling-allocator"] }
wasmtime-wasi = "21.0"
wasmtime-wast = "21.0"
wasm-bindgen = "0.2"
wat = "1.0"
wasmparser = "0.121"
wasm-encoder = "0.38"

# Geolocation services
sysinfo = "0.31"
ipgeolocate = "0.3"

# WebRTC implementation
webrtc = "0.11"
webrtc-util = "0.8"
webrtc-data = "0.7"
webrtc-media = "0.6"
webrtc-ice = "0.10"
webrtc-dtls = "0.7"

# Audio/Media processing
cpal = "0.15"
hound = "3.5"
symphonia = "0.5"
rodio = "0.19"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# URL handling
url = "2.5"

# Random number generation for human-like behavior
rand = "0.8"

# Async utilities
futures = "0.3"

# STDIO handling
tokio-util = { version = "0.7", features = ["codec"] }

# Regex for JavaScript processing
regex = "1.10"

# Enhanced JavaScript and parsing support - using compatible versions
swc_core = { version = "0.96", features = ["__ecma", "__parser", "ecma_ast"] }
swc_common = "0.34" 
swc_ecma_parser = "0.142"
swc_ecma_ast = "0.112"

# HTML escaping
html-escape = "0.2"

# UUID generation for WebSocket connections
uuid = { version = "1.0", features = ["v4"] }

# WebSocket implementation
tokio-tungstenite = { version = "0.20", features = ["native-tls"] }
tungstenite = "0.20"
futures-util = "0.3"

# Service Worker implementation (extends existing tokio features)

# Challenge solving dependencies
base64 = "0.22"

# CDP (Chrome DevTools Protocol) support
chrono = { version = "0.4", features = ["serde"] }

# AI Memory Heap for persistent storage
dirs = "5.0"

[[bin]]
name = "thalora"
path = "src/main.rs"

[dev-dependencies]
tokio-test = "0.4"
wiremock = "0.6"


# Resolver to handle dependency conflicts
[package.metadata.docs.rs]
all-features = true
