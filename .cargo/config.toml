[build]
# Temporarily disabled global suppression. Remove or re-enable only if
# you explicitly need to silence all warnings across the workspace.
# rustflags = ["-A", "warnings"]

[alias]
build-full = "build --release --features native"
build-wasm = "build --release --no-default-features --features wasm --target wasm32-unknown-unknown --lib"
xtask = "run --manifest-path xtask/Cargo.toml --"

# WASM target configuration for getrandom
[target.wasm32-unknown-unknown]
rustflags = ['--cfg', 'getrandom_backend="wasm_js"']
